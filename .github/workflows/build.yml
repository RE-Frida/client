name: Build Client

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: client-build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version:
    if: github.actor != 'github-actions[bot]'
    runs-on: self-hosted
    outputs:
      new: ${{ steps.bump.outputs.new }}
      tag: ${{ steps.bump.outputs.tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - id: bump
        run: |
          CURRENT=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          sed -i "s/\"version\": \"${CURRENT}\"/\"version\": \"${NEW_VERSION}\"/" src-tauri/tauri.conf.json

      - name: Commit and push tag (on push)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }} [skip ci]"
          git tag -f ${{ steps.bump.outputs.tag }}
          git push origin main
          git push origin --force ${{ steps.bump.outputs.tag }}

      - name: Commit and push tag only (on dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }}"
          git tag -f ${{ steps.bump.outputs.tag }}
          git push origin --force ${{ steps.bump.outputs.tag }}

  build:
    needs: [version]
    name: Build (${{ matrix.target }}, ${{ matrix.profile }})
    runs-on: self-hosted
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: re-frida-linux-amd64
            profile: release
            features: ""
            cross: false
          - target: x86_64-unknown-linux-gnu
            artifact: re-frida-linux-amd64-debug
            profile: debug
            features: "--features debug"
            cross: false
          - target: x86_64-pc-windows-gnu
            artifact: re-frida-windows-amd64
            profile: release
            features: ""
            cross: true
          - target: x86_64-pc-windows-gnu
            artifact: re-frida-windows-amd64-debug
            profile: debug
            features: "--features debug"
            cross: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          toolchain: nightly

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            xz-utils

      - name: Install Windows cross-compilation toolchain
        if: matrix.cross
        run: |
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64

      - name: Cache tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: src-tauri/tools
          key: tools-linux-${{ matrix.target }}-frida16

      - name: Download ADB + frida (Linux native)
        if: "!matrix.cross && steps.cache-tools.outputs.cache-hit != 'true'"
        run: |
          TRIPLE="${{ matrix.target }}"
          mkdir -p src-tauri/tools
          cd src-tauri/tools
          curl -sL "https://dl.google.com/android/repository/platform-tools-latest-linux.zip" -o pt.zip
          unzip -qo pt.zip
          cp platform-tools/adb "./adb-${TRIPLE}"
          chmod +x "./adb-${TRIPLE}"
          rm -rf platform-tools pt.zip
          FRIDA_TAG=$(curl -sLI -o /dev/null -w '%{url_effective}' "https://github.com/frida/frida/releases/latest" | xargs basename)
          FRIDA_VER="${FRIDA_TAG#v}"
          echo "Downloading frida-inject v${FRIDA_VER}"
          BASE_URL="https://github.com/frida/frida/releases/download/${FRIDA_TAG}"
          curl -sL "${BASE_URL}/frida-inject-${FRIDA_VER}-linux-x86_64.xz" -o frida-inject.xz
          xz -df frida-inject.xz
          mv frida-inject "frida-inject-${TRIPLE}"
          chmod +x "frida-inject-${TRIPLE}"

      - name: Download ADB + frida (Windows cross)
        if: matrix.cross && steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          TRIPLE="${{ matrix.target }}"
          mkdir -p src-tauri/tools
          cd src-tauri/tools
          curl -sL "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -o pt.zip
          unzip -qo pt.zip
          cp platform-tools/adb.exe "./adb-${TRIPLE}.exe"
          cp platform-tools/AdbWinApi.dll ./AdbWinApi.dll 2>/dev/null || true
          cp platform-tools/AdbWinUsbApi.dll ./AdbWinUsbApi.dll 2>/dev/null || true
          rm -rf platform-tools pt.zip
          FRIDA_TAG=$(curl -sLI -o /dev/null -w '%{url_effective}' "https://github.com/frida/frida/releases/latest" | xargs basename)
          FRIDA_VER="${FRIDA_TAG#v}"
          echo "Downloading frida-inject v${FRIDA_VER}"
          BASE_URL="https://github.com/frida/frida/releases/download/${FRIDA_TAG}"
          curl -sL "${BASE_URL}/frida-inject-${FRIDA_VER}-windows-x86_64.exe.xz" -o frida-inject.exe.xz
          xz -df frida-inject.exe.xz
          mv frida-inject.exe "frida-inject-${TRIPLE}.exe"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: tauri-linux-${{ matrix.target }}-${{ matrix.profile }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'src-tauri/Cargo.toml', 'protocol/Cargo.toml') }}
          restore-keys: |
            tauri-linux-${{ matrix.target }}-${{ matrix.profile }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx @tauri-apps/cli@latest build --target ${{ matrix.target }} ${{ matrix.features }} --no-bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename binary
        run: |
          EXT=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then EXT=".exe"; fi
          mv target/${{ matrix.target }}/release/re-frida-tauri${EXT} \
             target/${{ matrix.target }}/release/${{ matrix.artifact }}${EXT}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}*

  release:
    needs: [version, build]
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "RE:Frida Client ${{ needs.version.outputs.new }}"
          generate_release_notes: true
          files: artifacts/**/*
