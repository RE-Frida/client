name: Build Client

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: client-build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ${{ fromJson('["self-hosted", "Linux", "X64"]') }}
    outputs:
      new: ${{ steps.bump.outputs.new }}
      tag: ${{ steps.bump.outputs.tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - id: bump
        shell: bash
        run: |
          CURRENT=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          sed -i "s/\"version\": \"${CURRENT}\"/\"version\": \"${NEW_VERSION}\"/" src-tauri/tauri.conf.json

      - name: Commit and push tag (on push)
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }} [skip ci]"
          git tag -f ${{ steps.bump.outputs.tag }}
          git push origin main
          git push origin --force ${{ steps.bump.outputs.tag }}

      - name: Commit and push tag only (on dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }}"
          git tag -f ${{ steps.bump.outputs.tag }}
          git push origin --force ${{ steps.bump.outputs.tag }}

  build:
    needs: [version]
    name: Build (${{ matrix.artifact }}, ${{ matrix.profile }})
    runs-on: ${{ fromJson(matrix.runner) }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: '["self-hosted", "Linux", "X64"]'
            target: x86_64-unknown-linux-gnu
            artifact: re-frida-linux-amd64
            profile: release
            features: ""
            os: linux
          # - runner: '["self-hosted", "Linux", "X64"]'
          #   target: x86_64-unknown-linux-gnu
          #   artifact: re-frida-linux-amd64-debug
          #   profile: debug
          #   features: "--features debug"
          #   os: linux
          - runner: '["self-hosted", "Windows", "X64"]'
            target: x86_64-pc-windows-msvc
            artifact: re-frida-windows-amd64
            profile: release
            features: ""
            os: windows
          # - runner: '["self-hosted", "Windows", "X64"]'
          #   target: x86_64-pc-windows-msvc
          #   artifact: re-frida-windows-amd64-debug
          #   profile: debug
          #   features: "--features debug"
          #   os: windows

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain (Linux)
        if: matrix.os == 'linux'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          toolchain: nightly

      - name: Install Rust toolchain (Windows)
        if: matrix.os == 'windows'
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "$env:TEMP\rustup-init.exe"
          & "$env:TEMP\rustup-init.exe" -y --default-toolchain nightly --default-host x86_64-pc-windows-msvc
          echo "$env:USERPROFILE\.cargo\bin" >> $env:GITHUB_PATH

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            xz-utils

      - name: Cache tools
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: src-tauri/tools
          key: tools-${{ matrix.os }}-${{ matrix.target }}-frida16

      - name: Download ADB + frida (Linux)
        if: matrix.os == 'linux' && steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          TRIPLE="${{ matrix.target }}"
          mkdir -p src-tauri/tools
          cd src-tauri/tools
          curl -sL "https://dl.google.com/android/repository/platform-tools-latest-linux.zip" -o pt.zip
          unzip -qo pt.zip
          cp platform-tools/adb "./adb-${TRIPLE}"
          chmod +x "./adb-${TRIPLE}"
          rm -rf platform-tools pt.zip
          FRIDA_TAG=$(curl -sLI -o /dev/null -w '%{url_effective}' "https://github.com/frida/frida/releases/latest" | xargs basename)
          FRIDA_VER="${FRIDA_TAG#v}"
          echo "Downloading frida-inject v${FRIDA_VER}"
          BASE_URL="https://github.com/frida/frida/releases/download/${FRIDA_TAG}"
          curl -sL "${BASE_URL}/frida-inject-${FRIDA_VER}-linux-x86_64.xz" -o frida-inject.xz
          xz -df frida-inject.xz
          mv frida-inject "frida-inject-${TRIPLE}"
          chmod +x "frida-inject-${TRIPLE}"

      - name: Download ADB + frida (Windows)
        if: matrix.os == 'windows' && steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          TRIPLE="${{ matrix.target }}"
          mkdir -p src-tauri/tools
          cd src-tauri/tools
          curl -sL "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -o pt.zip
          unzip -qo pt.zip
          cp platform-tools/adb.exe "./adb-${TRIPLE}.exe"
          cp platform-tools/AdbWinApi.dll ./AdbWinApi.dll 2>/dev/null || true
          cp platform-tools/AdbWinUsbApi.dll ./AdbWinUsbApi.dll 2>/dev/null || true
          rm -rf platform-tools pt.zip
          FRIDA_TAG=$(curl -sLI -o /dev/null -w '%{url_effective}' "https://github.com/frida/frida/releases/latest" | xargs basename)
          FRIDA_VER="${FRIDA_TAG#v}"
          echo "Downloading frida-inject v${FRIDA_VER}"
          BASE_URL="https://github.com/frida/frida/releases/download/${FRIDA_TAG}"
          curl -sL "${BASE_URL}/frida-inject-${FRIDA_VER}-windows-x86_64.exe.xz" -o frida-inject.exe.xz
          xz -df frida-inject.exe.xz
          mv frida-inject.exe "frida-inject-${TRIPLE}.exe"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: tauri-${{ matrix.os }}-${{ matrix.target }}-${{ matrix.profile }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'src-tauri/Cargo.toml', 'protocol/Cargo.toml') }}
          restore-keys: |
            tauri-${{ matrix.os }}-${{ matrix.target }}-${{ matrix.profile }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx @tauri-apps/cli@latest build --target ${{ matrix.target }} ${{ matrix.features }} --no-bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename binary (Linux)
        if: matrix.os == 'linux'
        shell: bash
        run: |
          mv target/${{ matrix.target }}/release/re-frida-tauri \
             target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows'
        shell: powershell
        run: |
          Move-Item -Path "target/${{ matrix.target }}/release/re-frida-tauri.exe" `
                    -Destination "target/${{ matrix.target }}/release/${{ matrix.artifact }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}*

  release:
    needs: [version, build]
    runs-on: ${{ fromJson('["self-hosted", "Linux", "X64"]') }}
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "RE:Frida Client ${{ needs.version.outputs.new }}"
          generate_release_notes: true
          files: artifacts/**/*
